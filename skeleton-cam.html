<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkeletonCam</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tensorflow/4.10.0/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

  :root {
    --bg: #020508;
    --panel: #060d14;
    --accent: #00f5c8;
    --accent2: #0af;
    --danger: #ff2d55;
    --text: #c8e8f0;
    --muted: #3a5a6a;
    --glow: 0 0 20px rgba(0,245,200,0.4);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,245,200,0.015) 2px,
      rgba(0,245,200,0.015) 4px
    );
    pointer-events: none;
    z-index: 999;
  }

  header {
    width: 100%;
    padding: 20px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid rgba(0,245,200,0.15);
    background: rgba(6,13,20,0.9);
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(10px);
  }

  .logo {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: 1.4rem;
    color: var(--accent);
    text-shadow: var(--glow);
    letter-spacing: 3px;
  }

  .logo span { color: var(--accent2); }

  .status-bar {
    display: flex;
    gap: 24px;
    align-items: center;
    font-size: 0.75rem;
    color: var(--muted);
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--danger);
    display: inline-block;
    margin-right: 6px;
    animation: pulse 1.5s infinite;
  }
  .status-dot.active { background: var(--accent); }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  main {
    width: 100%;
    max-width: 1100px;
    padding: 30px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  .cam-wrapper {
    position: relative;
    width: 100%;
    max-width: 860px;
    border: 1px solid rgba(0,245,200,0.2);
    border-radius: 4px;
    overflow: hidden;
    background: #000;
    box-shadow: 0 0 60px rgba(0,245,200,0.07), inset 0 0 80px rgba(0,0,0,0.8);
  }

  /* Corner brackets */
  .cam-wrapper::before, .cam-wrapper::after {
    content: '';
    position: absolute;
    width: 24px; height: 24px;
    border-color: var(--accent);
    border-style: solid;
    z-index: 10;
    pointer-events: none;
  }
  .cam-wrapper::before { top: 8px; left: 8px; border-width: 2px 0 0 2px; }
  .cam-wrapper::after  { bottom: 8px; right: 8px; border-width: 0 2px 2px 0; }

  #video {
    width: 100%;
    display: block;
    transform: scaleX(-1);
    opacity: 0;
    transition: opacity 0.5s;
  }
  #video.ready { opacity: 1; }

  #canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    transform: scaleX(-1);
  }

  .overlay-hud {
    position: absolute;
    top: 16px; left: 16px;
    z-index: 10;
    display: flex;
    flex-direction: column;
    gap: 6px;
    pointer-events: none;
  }

  .hud-chip {
    background: rgba(2,5,8,0.75);
    border: 1px solid rgba(0,245,200,0.3);
    padding: 4px 10px;
    font-size: 0.7rem;
    color: var(--accent);
    letter-spacing: 1.5px;
    backdrop-filter: blur(4px);
  }

  .person-count-big {
    position: absolute;
    top: 16px; right: 16px;
    z-index: 10;
    background: rgba(2,5,8,0.8);
    border: 1px solid rgba(0,245,200,0.4);
    padding: 10px 18px;
    text-align: center;
    backdrop-filter: blur(4px);
  }

  .person-count-big .num {
    font-family: 'Orbitron', monospace;
    font-size: 2.4rem;
    font-weight: 900;
    color: var(--accent);
    text-shadow: var(--glow);
    line-height: 1;
  }

  .person-count-big .label {
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 2px;
    margin-top: 2px;
  }

  .placeholder {
    width: 100%;
    aspect-ratio: 16/9;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    background: linear-gradient(135deg, #060d14 0%, #020508 100%);
    color: var(--muted);
  }
  .placeholder svg { opacity: 0.3; }
  .placeholder p { font-size: 0.8rem; letter-spacing: 2px; }

  /* Stats row */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    width: 100%;
    max-width: 860px;
  }

  .stat-card {
    background: var(--panel);
    border: 1px solid rgba(0,245,200,0.1);
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .stat-card .s-label {
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .stat-card .s-val {
    font-family: 'Orbitron', monospace;
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--accent);
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }

  button {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.8rem;
    letter-spacing: 2px;
    padding: 10px 24px;
    cursor: pointer;
    border-radius: 0;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .btn-primary {
    background: var(--accent);
    color: var(--bg);
    border: none;
    box-shadow: 0 0 20px rgba(0,245,200,0.3);
  }
  .btn-primary:hover {
    background: #fff;
    box-shadow: 0 0 30px rgba(0,245,200,0.6);
  }
  .btn-primary:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    box-shadow: none;
  }

  .btn-ghost {
    background: transparent;
    color: var(--accent);
    border: 1px solid rgba(0,245,200,0.4);
  }
  .btn-ghost:hover {
    background: rgba(0,245,200,0.08);
    border-color: var(--accent);
  }
  .btn-ghost.active {
    background: rgba(0,245,200,0.12);
    border-color: var(--accent);
    color: #fff;
  }

  /* Loading bar */
  .loading-bar {
    width: 100%;
    max-width: 860px;
    height: 2px;
    background: rgba(0,245,200,0.1);
    display: none;
    overflow: hidden;
  }
  .loading-bar.show { display: block; }
  .loading-bar::after {
    content: '';
    display: block;
    height: 100%;
    background: var(--accent);
    width: 40%;
    animation: loading 1s ease-in-out infinite alternate;
  }
  @keyframes loading {
    from { transform: translateX(-100%); }
    to { transform: translateX(350%); }
  }

  .log {
    width: 100%;
    max-width: 860px;
    background: var(--panel);
    border: 1px solid rgba(0,245,200,0.1);
    padding: 12px 16px;
    font-size: 0.7rem;
    color: var(--muted);
    min-height: 36px;
    letter-spacing: 1px;
  }
  .log span { color: var(--accent); }

  footer {
    margin-top: auto;
    padding: 20px;
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 2px;
    opacity: 0.5;
  }
</style>
</head>
<body>

<header>
  <div class="logo">SKELETON<span>CAM</span></div>
  <div class="status-bar">
    <div><span class="status-dot" id="camDot"></span><span id="camStatus">CÂMARA OFF</span></div>
    <div><span class="status-dot" id="modelDot"></span><span id="modelStatus">MODELO NÃO CARREGADO</span></div>
  </div>
</header>

<main>
  <div class="controls">
    <button class="btn-primary" id="startBtn" onclick="startCamera()">⬤ INICIAR CÂMARA</button>
    <button class="btn-ghost" id="skeletonToggle" onclick="toggleSkeleton()">ESQUELETO ON</button>
    <button class="btn-ghost" id="keypointToggle" onclick="toggleKeypoints()">PONTOS ON</button>
    <button class="btn-ghost" id="boxToggle" onclick="toggleBox()">CAIXA OFF</button>
  </div>

  <div class="loading-bar" id="loadingBar"></div>

  <div class="cam-wrapper" id="camWrapper">
    <div class="placeholder" id="placeholder">
      <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
        <rect x="8" y="16" width="48" height="36" rx="2" stroke="#00f5c8" stroke-width="2"/>
        <circle cx="32" cy="34" r="10" stroke="#00f5c8" stroke-width="2"/>
        <circle cx="32" cy="34" r="4" fill="#00f5c8" opacity="0.3"/>
        <path d="M24 16V12a2 2 0 012-2h12a2 2 0 012 2v4" stroke="#00f5c8" stroke-width="2"/>
      </svg>
      <p>CLIQUE EM "INICIAR CÂMARA"</p>
    </div>
    <video id="video" autoplay muted playsinline></video>
    <canvas id="canvas"></canvas>

    <div class="overlay-hud">
      <div class="hud-chip" id="fpsChip">FPS: --</div>
      <div class="hud-chip" id="modelChip">MODEL: --</div>
    </div>

    <div class="person-count-big">
      <div class="num" id="countNum">0</div>
      <div class="label">PESSOAS</div>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="s-label">Pessoas Detetadas</div>
      <div class="s-val" id="statPeople">0</div>
    </div>
    <div class="stat-card">
      <div class="s-label">Pontos Chave (total)</div>
      <div class="s-val" id="statKeypoints">0</div>
    </div>
    <div class="stat-card">
      <div class="s-label">Confiança Média</div>
      <div class="s-val" id="statConf">0%</div>
    </div>
  </div>

  <div class="log" id="logBox">// aguardando inicialização...</div>
</main>

<footer>SKELETONCAM v1.0 · TENSORFLOW.JS + MOVENET · PROCESSAMENTO LOCAL</footer>

<script>
let detector = null;
let animFrame = null;
let running = false;
let showSkeleton = true;
let showKeypoints = true;
let showBox = false;
let fps = 0, lastTime = 0, frameCount = 0;

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// MoveNet connections
const CONNECTIONS = [
  [0,1],[0,2],[1,3],[2,4],           // face
  [5,6],                              // shoulders
  [5,7],[7,9],[6,8],[8,10],          // arms
  [5,11],[6,12],[11,12],             // torso
  [11,13],[13,15],[12,14],[14,16]    // legs
];

const KEYPOINT_NAMES = [
  'nose','left_eye','right_eye','left_ear','right_ear',
  'left_shoulder','right_shoulder','left_elbow','right_elbow',
  'left_wrist','right_wrist','left_hip','right_hip',
  'left_knee','right_knee','left_ankle','right_ankle'
];

const PART_COLORS = {
  face:   '#00f5c8',
  arms:   '#0af',
  torso:  '#00f5c8',
  legs:   '#0af'
};

function getColor(i, j) {
  if ([0,1,2,3,4].includes(i) && [0,1,2,3,4].includes(j)) return '#00f5c8';
  if ([5,6,7,8,9,10].includes(i) || [5,6,7,8,9,10].includes(j)) return '#0af';
  if ([11,12].includes(i) && [11,12].includes(j)) return '#00f5c8';
  return '#0af';
}

function log(msg, highlight = '') {
  const el = document.getElementById('logBox');
  if (highlight) {
    el.innerHTML = `// ${msg} <span>${highlight}</span>`;
  } else {
    el.textContent = `// ${msg}`;
  }
}

async function startCamera() {
  const btn = document.getElementById('startBtn');
  btn.disabled = true;
  document.getElementById('loadingBar').classList.add('show');
  log('solicitando acesso à câmara...');

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: 'user' }
    });
    video.srcObject = stream;
    await new Promise(r => video.onloadedmetadata = r);
    video.play();
    video.classList.add('ready');
    document.getElementById('placeholder').style.display = 'none';

    // Sync canvas size
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    document.getElementById('camDot').classList.add('active');
    document.getElementById('camStatus').textContent = 'CÂMARA ATIVA';
    log('câmara iniciada. carregando modelo MoveNet...');

    await loadModel();
  } catch (e) {
    log('erro ao aceder à câmara:', e.message);
    btn.disabled = false;
    document.getElementById('loadingBar').classList.remove('show');
  }
}

async function loadModel() {
  try {
    document.getElementById('modelChip').textContent = 'MODEL: CARREGANDO...';
    detector = await poseDetection.createDetector(
      poseDetection.SupportedModels.MoveNet,
      {
        modelType: poseDetection.movenet.modelType.MULTIPOSE_LIGHTNING,
        enableSmoothing: true,
        multiPoseMaxDimension: 256,
        enableTracking: true,
        trackerType: poseDetection.TrackerType.BoundingBox
      }
    );

    document.getElementById('modelDot').classList.add('active');
    document.getElementById('modelStatus').textContent = 'MOVENET ATIVO';
    document.getElementById('modelChip').textContent = 'MODEL: MOVENET-MULTI';
    document.getElementById('loadingBar').classList.remove('show');
    log('modelo carregado com sucesso. detetando poses...', 'ONLINE');

    running = true;
    detectLoop();
  } catch (e) {
    log('erro ao carregar modelo:', e.message);
  }
}

async function detectLoop() {
  if (!running) return;

  // FPS calc
  frameCount++;
  const now = performance.now();
  if (now - lastTime >= 1000) {
    fps = frameCount;
    frameCount = 0;
    lastTime = now;
    document.getElementById('fpsChip').textContent = `FPS: ${fps}`;
  }

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  try {
    const poses = await detector.estimatePoses(video, {
      maxPoses: 6,
      flipHorizontal: false,
      scoreThreshold: 0.3
    });

    const count = poses.length;
    document.getElementById('countNum').textContent = count;
    document.getElementById('statPeople').textContent = count;

    let totalKp = 0, totalConf = 0, confCount = 0;

    poses.forEach((pose, idx) => {
      const kps = pose.keypoints;
      const color = `hsl(${(idx * 60 + 160) % 360}, 100%, 65%)`;

      // Bounding box
      if (showBox && pose.box) {
        const { xMin, yMin, width, height } = pose.box;
        ctx.strokeStyle = color;
        ctx.lineWidth = 1.5;
        ctx.setLineDash([6, 4]);
        ctx.strokeRect(xMin, yMin, width, height);
        ctx.setLineDash([]);

        // Person label
        ctx.fillStyle = color;
        ctx.font = `bold 12px 'Share Tech Mono', monospace`;
        ctx.fillText(`P${idx + 1}`, xMin + 6, yMin + 16);
      }

      // Skeleton
      if (showSkeleton) {
        CONNECTIONS.forEach(([i, j]) => {
          const a = kps[i], b = kps[j];
          if (a && b && a.score > 0.3 && b.score > 0.3) {
            const grad = ctx.createLinearGradient(a.x, a.y, b.x, b.y);
            grad.addColorStop(0, color + 'cc');
            grad.addColorStop(1, color + '88');
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.strokeStyle = grad;
            ctx.lineWidth = 2.5;
            ctx.shadowColor = color;
            ctx.shadowBlur = 8;
            ctx.stroke();
            ctx.shadowBlur = 0;
          }
        });
      }

      // Keypoints
      if (showKeypoints) {
        kps.forEach((kp, ki) => {
          if (kp.score > 0.3) {
            ctx.beginPath();
            ctx.arc(kp.x, kp.y, 4, 0, Math.PI * 2);
            ctx.fillStyle = color;
            ctx.shadowColor = color;
            ctx.shadowBlur = 12;
            ctx.fill();
            ctx.shadowBlur = 0;
            totalKp++;
          }
          if (kp.score > 0) {
            totalConf += kp.score;
            confCount++;
          }
        });
      }
    });

    document.getElementById('statKeypoints').textContent = totalKp;
    const avgConf = confCount > 0 ? Math.round((totalConf / confCount) * 100) : 0;
    document.getElementById('statConf').textContent = `${avgConf}%`;

  } catch (e) { /* skip frame */ }

  animFrame = requestAnimationFrame(detectLoop);
}

function toggleSkeleton() {
  showSkeleton = !showSkeleton;
  const btn = document.getElementById('skeletonToggle');
  btn.textContent = `ESQUELETO ${showSkeleton ? 'ON' : 'OFF'}`;
  btn.classList.toggle('active', showSkeleton);
}

function toggleKeypoints() {
  showKeypoints = !showKeypoints;
  const btn = document.getElementById('keypointToggle');
  btn.textContent = `PONTOS ${showKeypoints ? 'ON' : 'OFF'}`;
  btn.classList.toggle('active', showKeypoints);
}

function toggleBox() {
  showBox = !showBox;
  const btn = document.getElementById('boxToggle');
  btn.textContent = `CAIXA ${showBox ? 'ON' : 'OFF'}`;
  btn.classList.toggle('active', showBox);
}

// Init button states
document.getElementById('skeletonToggle').classList.add('active');
document.getElementById('keypointToggle').classList.add('active');
</script>
</body>
</html>
