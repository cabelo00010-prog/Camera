<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Ângelo AI - Fullscreen</title>
  
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/holistic/holistic.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

  <style>
    /* Remove todas as margens e barras de scroll */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body, html { 
      width: 100%; 
      height: 100%; 
      overflow: hidden; 
      background-color: black; 
    }

    /* O Canvas ocupa o ecrã inteiro e a imagem estica para cobrir tudo */
    canvas { 
      width: 100vw; 
      height: 100vh; 
      object-fit: cover; /* Garante que preenche tudo sem bordas pretas */
    }

    .info-overlay {
      position: absolute;
      top: 15px;
      left: 15px;
      color: rgba(0, 255, 0, 0.8);
      font-family: 'Monaco', monospace;
      font-size: 12px;
      pointer-events: none; /* Não atrapalha o toque */
      text-transform: uppercase;
      letter-spacing: 1px;
    }
  </style>
</head>

<body>
  <div class="info-overlay">System: Pose + Hands Fullscreen</div>
  <video id="input_video" style="display:none" playsinline></video>
  <canvas id="output_canvas"></canvas>

  <script type="module">
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');

    function onResults(results) {
      // Ajusta a resolução interna do canvas para a do vídeo
      canvasElement.width = videoElement.videoWidth;
      canvasElement.height = videoElement.videoHeight;

      canvasCtx.save();
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
      
      // Desenha o frame da câmara
      canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

      // Desenhar Corpo (Pose) - Verde neon
      if (results.poseLandmarks) {
        drawConnectors(canvasCtx, results.poseLandmarks, POSE_CONNECTIONS,
                       {color: '#00FF00', lineWidth: 5});
        drawLandmarks(canvasCtx, results.poseLandmarks,
                      {color: '#FF0000', lineWidth: 1, radius: 4});
      }

      // Desenhar Mãos - Azul Ciano
      const handStyle = {color: '#00FFFF', lineWidth: 4};
      if (results.leftHandLandmarks) {
        drawConnectors(canvasCtx, results.leftHandLandmarks, HAND_CONNECTIONS, handStyle);
        drawLandmarks(canvasCtx, results.leftHandLandmarks, {color: '#FFFFFF', radius: 2});
      }
      if (results.rightHandLandmarks) {
        drawConnectors(canvasCtx, results.rightHandLandmarks, HAND_CONNECTIONS, handStyle);
        drawLandmarks(canvasCtx, results.rightHandLandmarks, {color: '#FFFFFF', radius: 2});
      }

      canvasCtx.restore();
    }

    const holistic = new Holistic({locateFile: (file) => {
      return `https://cdn.jsdelivr.net/npm/@mediapipe/holistic/${file}`;
    }});

    holistic.setOptions({
      modelComplexity: 0, // Máxima velocidade para fullscreen
      smoothLandmarks: true,
      enableFaceGeometry: false, // Otimização total
      minDetectionConfidence: 0.5,
      minTrackingConfidence: 0.5
    });

    holistic.onResults(onResults);

    const camera = new Camera(videoElement, {
      onFrame: async () => {
        await holistic.send({image: videoElement});
      },
      width: 1280,
      height: 720
    });
    camera.start();
  </script>
</body>
</html>
