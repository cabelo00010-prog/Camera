<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Ângelo AI - Multi-Person Detector</title>

  <!-- TensorFlow.js + COCO-SSD -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>

  <style>
    /* === Reset total === */
    *, *::before, *::after { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
    }
    
    body, html { 
      width: 100%; 
      height: 100%; 
      overflow: hidden; 
      background-color: #000; 
      font-family: 'Monaco', 'Consolas', 'Courier New', monospace;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }

    /* === Canvas === */
    canvas { 
      display: block;
      width: 100vw; 
      height: 100vh; 
      object-fit: cover;
    }

    /* === Overlays === */
    .overlay {
      position: absolute;
      pointer-events: none;
      z-index: 10;
      transition: opacity 0.3s ease;
    }

    /* Info canto superior esquerdo */
    .info-overlay {
      top: 15px;
      left: 15px;
      color: rgba(0, 255, 163, 0.85);
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      text-shadow: 0 0 10px rgba(0, 255, 163, 0.3);
      background: rgba(0, 0, 0, 0.6);
      padding: 6px 12px;
      border-radius: 4px;
      border: 1px solid rgba(0, 255, 163, 0.2);
    }

    /* Contador de pessoas (lado direito do info) */
    .people-count {
      margin-left: 10px;
      padding-left: 10px;
      border-left: 1px solid rgba(0, 255, 163, 0.3);
      color: #FF0066;
      font-weight: bold;
    }

    /* Status da câmara (centro) */
    .status-overlay {
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      font-size: 18px;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-align: center;
      background: rgba(0, 0, 0, 0.8);
      padding: 20px 30px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .status-overlay .spinner {
      display: inline-block;
      width: 24px;
      height: 24px;
      border: 3px solid rgba(0, 255, 163, 0.3);
      border-top-color: #00FFA3;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 12px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .status-overlay.error {
      border-color: rgba(255, 50, 50, 0.5);
      color: #ff4444;
    }

    .status-overlay.error .spinner {
      display: none;
    }

    /* Barra de progresso do modelo */
    .progress-bar-container {
      width: 200px;
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      margin: 10px auto 0;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #00FFA3, #00FFFF);
      border-radius: 2px;
      transition: width 0.3s ease;
    }

    /* FPS counter */
    .fps-overlay {
      bottom: 20px;
      right: 20px;
      color: rgba(0, 255, 163, 0.5);
      font-size: 10px;
      letter-spacing: 1px;
      background: rgba(0, 0, 0, 0.5);
      padding: 4px 8px;
      border-radius: 3px;
    }

    /* Controlos */
    .controls {
      position: absolute;
      bottom: 20px;
      left: 20px;
      z-index: 20;
      display: flex;
      gap: 10px;
      pointer-events: none;
    }

    .controls button {
      pointer-events: auto;
      background: rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(0, 255, 163, 0.3);
      color: rgba(0, 255, 163, 0.8);
      padding: 8px 14px;
      border-radius: 6px;
      font-family: 'Monaco', monospace;
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s ease;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    .controls button:hover,
    .controls button:active {
      background: rgba(0, 255, 163, 0.15);
      border-color: rgba(0, 255, 163, 0.6);
      box-shadow: 0 0 15px rgba(0, 255, 163, 0.2);
    }

    .controls button.active {
      background: rgba(0, 255, 163, 0.2);
      border-color: #00FFA3;
    }

    /* Responsivo: mobile */
    @media (max-width: 600px) {
      .info-overlay { font-size: 9px; padding: 4px 8px; top: 10px; left: 10px; }
      .controls button { font-size: 9px; padding: 6px 10px; }
      .fps-overlay { font-size: 8px; }
      .status-overlay { font-size: 14px; padding: 15px 20px; }
    }
  </style>
</head>

<body>
  <!-- Overlays -->
  <div class="overlay info-overlay" role="status" aria-live="polite" id="infoOverlay">
    ⚡ System: Multi-Person Detection
    <span class="people-count" id="peopleCount">0</span>
  </div>

  <div class="overlay status-overlay" id="statusOverlay">
    <div class="spinner" id="spinner"></div>
    <div id="statusText">A carregar modelo...</div>
    <div class="progress-bar-container">
      <div class="progress-bar" id="progressBar"></div>
    </div>
  </div>

  <div class="overlay fps-overlay" id="fpsOverlay">-- FPS</div>

  <!-- Controlos -->
  <div class="controls" role="toolbar" aria-label="Controlos da câmara">
    <button id="pauseBtn" aria-label="Pausar ou retomar deteção" title="Pausar/Retomar">⏸ Pausar</button>
    <button id="mirrorBtn" class="active" aria-label="Ativar ou desativar modo espelho" title="Modo Espelho">🪞 Espelho</button>
    <button id="screenshotBtn" aria-label="Tirar captura de ecrã" title="Capturar Screenshot">📸 Capturar</button>
    <button id="detectBtn" aria-label="Alternar entre detetar só pessoas ou todos os objetos" title="Detetar objetos">📦 Objetos</button>
  </div>

  <!-- Elementos escondidos -->
  <video id="input_video" style="display:none" playsinline></video>
  <canvas id="output_canvas"></canvas>

  <script>
    // === Elementos DOM ===
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const statusOverlay = document.getElementById('statusOverlay');
    const statusText = document.getElementById('statusText');
    const spinner = document.getElementById('spinner');
    const progressBar = document.getElementById('progressBar');
    const fpsOverlay = document.getElementById('fpsOverlay');
    const peopleCount = document.getElementById('peopleCount');
    const pauseBtn = document.getElementById('pauseBtn');
    const mirrorBtn = document.getElementById('mirrorBtn');
    const screenshotBtn = document.getElementById('screenshotBtn');
    const detectBtn = document.getElementById('detectBtn');

    // === Estado ===
    let isPaused = false;
    let isMirror = true;
    let onlyPeople = true; // por defeito só pessoas
    let model = null;
    let modelLoading = false;
    let frameCount = 0;
    let lastFpsTime = performance.now();
    let currentFps = 0;
    let animationId = null;
    let detectInterval = null;
    const DETECT_INTERVAL_MS = 100; // ~10 FPS de deteção

    // === Cores para bounding boxes (cíclicas) ===
    const BOX_COLORS = [
      '#00FFA3', // verde menta
      '#FF0066', // rosa choque
      '#00FFFF', // ciano
      '#FFAA00', // laranja
      '#AA00FF', // roxo
      '#FF4400'  // vermelho neon
    ];

    // === Utilitários ===
    const delay = (ms) => new Promise(resolve => setTimeout(resolve, ms));

    // === Atualizar FPS ===
    function updateFps() {
      frameCount++;
      const now = performance.now();
      if (now - lastFpsTime >= 1000) {
        currentFps = Math.round(frameCount * 1000 / (now - lastFpsTime));
        frameCount = 0;
        lastFpsTime = now;
        fpsOverlay.textContent = `${currentFps} FPS`;
      }
    }

    // === Ajustar canvas ===
    function adjustCanvasSize() {
      if (videoElement.videoWidth === 0) return;
      canvasElement.width = videoElement.videoWidth;
      canvasElement.height = videoElement.videoHeight;
    }

    // === Desenhar bounding boxes ===
    function drawDetections(predictions) {
      const w = canvasElement.width;
      const h = canvasElement.height;

      // Filtrar: só pessoas se onlyPeople=true
      const filtered = onlyPeople
        ? predictions.filter(p => p.class === 'person')
        : predictions;

      // Atualizar contador
      peopleCount.textContent = filtered.length;

      // Desenhar cada deteção
      filtered.forEach((pred, index) => {
        const [x, y, boxW, boxH] = pred.bbox;
        const color = BOX_COLORS[index % BOX_COLORS.length];
        const confidence = Math.round(pred.score * 100);
        const label = onlyPeople 
          ? `Pessoa ${index + 1}`
          : `${pred.class} ${index + 1}`;

        // === Bounding box com glow ===
        canvasCtx.shadowColor = color;
        canvasCtx.shadowBlur = 15;
        canvasCtx.strokeStyle = color;
        canvasCtx.lineWidth = 3;
        canvasCtx.strokeRect(x, y, boxW, boxH);
        canvasCtx.shadowBlur = 0;

        // === Cantos neon (mais grossos nos cantos - estilo cyberpunk) ===
        const cornerLen = Math.min(boxW, boxH) * 0.15;
        canvasCtx.strokeStyle = color;
        canvasCtx.lineWidth = 5;
        
        // Canto superior esquerdo
        canvasCtx.beginPath();
        canvasCtx.moveTo(x, y + cornerLen);
        canvasCtx.lineTo(x, y);
        canvasCtx.lineTo(x + cornerLen, y);
        canvasCtx.stroke();

        // Canto superior direito
        canvasCtx.beginPath();
        canvasCtx.moveTo(x + boxW - cornerLen, y);
        canvasCtx.lineTo(x + boxW, y);
        canvasCtx.lineTo(x + boxW, y + cornerLen);
        canvasCtx.stroke();

        // Canto inferior esquerdo
        canvasCtx.beginPath();
        canvasCtx.moveTo(x, y + boxH - cornerLen);
        canvasCtx.lineTo(x, y + boxH);
        canvasCtx.lineTo(x + cornerLen, y + boxH);
        canvasCtx.stroke();

        // Canto inferior direito
        canvasCtx.beginPath();
        canvasCtx.moveTo(x + boxW - cornerLen, y + boxH);
        canvasCtx.lineTo(x + boxW, y + boxH);
        canvasCtx.lineTo(x + boxW, y + boxH - cornerLen);
        canvasCtx.stroke();

        // === Label acima da box ===
        const labelText = `${label} (${confidence}%)`;
        canvasCtx.font = 'bold 14px Monaco, Consolas, monospace';
        const textWidth = canvasCtx.measureText(labelText).width;

        // Fundo do label
        canvasCtx.fillStyle = color;
        canvasCtx.globalAlpha = 0.85;
        canvasCtx.fillRect(x, y - 24, textWidth + 16, 22);
        canvasCtx.globalAlpha = 1.0;

        // Texto do label
        canvasCtx.fillStyle = '#000';
        canvasCtx.font = 'bold 12px Monaco, Consolas, monospace';
        canvasCtx.fillText(labelText, x + 8, y - 8);

        // === Keypoints (centro da pessoa, olhos, etc.) - se disponíveis ===
        // COCO-SSD não dá keypoints, mas podemos marcar o centro da box
        const cx = x + boxW / 2;
        const cy = y + boxH / 2;
        
        canvasCtx.shadowColor = color;
        canvasCtx.shadowBlur = 8;
        canvasCtx.fillStyle = color;
        canvasCtx.beginPath();
        canvasCtx.arc(cx, cy, 3, 0, Math.PI * 2);
        canvasCtx.fill();
        canvasCtx.shadowBlur = 0;
      });
    }

    // === Loop de deteção ===
    function detectFrame() {
      if (isPaused) {
        animationId = requestAnimationFrame(detectFrame);
        return;
      }

      // Limpa o canvas e desenha o frame da câmara
      adjustCanvasSize();
      canvasCtx.save();
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

      // Modo espelho
      if (isMirror) {
        canvasCtx.translate(canvasElement.width, 0);
        canvasCtx.scale(-1, 1);
      }

      // Desenha o vídeo
      canvasCtx.drawImage(videoElement, 0, 0, canvasElement.width, canvasElement.height);
      canvasCtx.restore();

      // Deteção (a cada DETECT_INTERVAL_MS ms)
      if (model && !modelLoading && videoElement.readyState >= 2) {
        const now = performance.now();
        if (!detectInterval || now - detectInterval >= DETECT_INTERVAL_MS) {
          detectInterval = now;
          model.detect(videoElement).then(predictions => {
            // Desenha as deteções no canvas
            canvasCtx.save();
            if (isMirror) {
              canvasCtx.translate(canvasElement.width, 0);
              canvasCtx.scale(-1, 1);
            }
            drawDetections(predictions);
            canvasCtx.restore();
          }).catch(err => {
            // Silêncio
          });
        }
      }

      updateFps();

      // Esconde status após primeiro frame
      if (statusOverlay.style.opacity !== '0' && videoElement.readyState >= 3) {
        statusOverlay.style.opacity = '0';
        setTimeout(() => { statusOverlay.style.display = 'none'; }, 400);
      }

      animationId = requestAnimationFrame(detectFrame);
    }

    // === Inicializar modelo COCO-SSD ===
    async function initModel() {
      statusText.textContent = 'A carregar modelo de deteção...';
      progressBar.style.width = '30%';

      try {
        model = await cocoSsd.load({
          base: 'lite_mobilenet_v2', // Mais leve para mobile
          modelUrl: undefined
        });

        progressBar.style.width = '100%';
        await delay(300);
        statusText.textContent = 'Modelo carregado! A iniciar câmara...';
        return true;
      } catch (err) {
        console.error('Erro ao carregar modelo:', err);
        statusOverlay.classList.add('error');
        spinner.style.display = 'none';
        progressBar.style.display = 'none';
        statusText.textContent = '❌ Erro ao carregar modelo. Recarrega a página.';
        return false;
      }
    }

    // === Inicializar câmara ===
    async function initCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: 'environment', // câmara traseira primeiro
            width: { ideal: 640 },
            height: { ideal: 480 }
          },
          audio: false
        });

        videoElement.srcObject = stream;
        await videoElement.play();

        statusText.textContent = 'Câmara ativa!';
        await delay(500);
        return true;
      } catch (err) {
        console.error('Erro ao iniciar câmara:', err);
        statusOverlay.classList.add('error');
        spinner.style.display = 'none';
        progressBar.style.display = 'none';

        // Tentar câmara frontal se a traseira falhar
        if (err.name === 'NotAllowedError') {
          statusText.textContent = '❌ Permissão negada. Permite o acesso à câmara.';
        } else {
          statusText.textContent = '❌ Erro ao aceder à câmara. Verifica as permissões.';
        }
        return false;
      }
    }

    // === Screenshot ===
    function takeScreenshot() {
      try {
        const link = document.createElement('a');
        link.download = `detection-${Date.now()}.png`;
        link.href = canvasElement.toDataURL('image/png');
        link.click();
      } catch (err) {
        console.error('Erro ao capturar screenshot:', err);
      }
    }

    // === Event Listeners ===
    pauseBtn.addEventListener('click', () => {
      isPaused = !isPaused;
      pauseBtn.textContent = isPaused ? '▶ Retomar' : '⏸ Pausar';
      pauseBtn.classList.toggle('active', isPaused);
    });

    mirrorBtn.addEventListener('click', () => {
      isMirror = !isMirror;
      mirrorBtn.classList.toggle('active', isMirror);
    });

    screenshotBtn.addEventListener('click', takeScreenshot);

    detectBtn.addEventListener('click', () => {
      onlyPeople = !onlyPeople;
      detectBtn.classList.toggle('active', !onlyPeople);
      detectBtn.textContent = onlyPeople ? '📦 Objetos' : '🧑 Pessoas';
    });

    window.addEventListener('resize', () => {
      if (videoElement.videoWidth > 0) adjustCanvasSize();
    });

    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space' && !e.repeat) {
        e.preventDefault();
        pauseBtn.click();
      }
    });

    // === Arranque ===
    async function main() {
      // 1. Carregar modelo
      const modelOk = await initModel();
      if (!modelOk) return;

      // 2. Iniciar câmara
      const camOk = await initCamera();
      if (!camOk) return;

      // 3. Iniciar loop de deteção
      detectFrame();
    }

    main().catch(err => {
      console.error('Erro fatal:', err);
      statusOverlay.classList.add('error');
      spinner.style.display = 'none';
      progressBar.style.display = 'none';
      statusText.textContent = '❌ Erro fatal ao iniciar. Recarrega a página.';
    });
  </script>
</body>
</html>
